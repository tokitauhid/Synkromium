# ─── Synkromium Release Pipeline ────────────────────────────────
#
# Triggered when a version tag is pushed (e.g. v0.1.0).
# Builds native binaries on Linux, macOS, and Windows runners,
# then uploads everything to a published GitHub Release
# with release notes generated from commit messages.
#
# Usage:
#   git tag v0.1.0
#   git push origin v0.1.0
#

name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Need write access to create releases and upload assets.
permissions:
  contents: write

jobs:
  # ── Linux Build ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build & package (Linux)
        run: npm run dist:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-binaries
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
          retention-days: 5

  # ── macOS Build ──────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build & package (macOS)
        run: npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mac-binaries
          path: |
            release/*.dmg
            release/*.zip
          retention-days: 5

  # ── Windows Build ────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build & package (Windows)
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-binaries
          path: |
            release/*.exe
          retention-days: 5

  # ── Create GitHub Release ────────────────────────────────────
  publish:
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes from commits
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Find the previous tag (the one right before the current one)
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
            # No previous tag found — include all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$TAG")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}")
          fi
          # Write to file so multi-line output is preserved
          echo "$COMMITS" > /tmp/release_notes.md
          echo "Generated release notes for $PREV_TAG → $TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          body_path: /tmp/release_notes.md
          files: |
            artifacts/linux-binaries/*
            artifacts/mac-binaries/*
            artifacts/windows-binaries/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
